services:
  db:
    image: postgres:16-alpine
    container_name: MyAnimeRateDB
    hostname: MyAnimeRateDB
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - TZ=Europe/Paris
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_USER=postgres
      - POSTGRES_DB=MyAnimeRateDB
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 0.5s
      timeout: 0.5s
      retries: 10

  seeder:
    build: ./database
    container_name: MyAnimeRateSeeder
    restart: "no"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=MyAnimeRateDB
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    container_name: MyAnimeRateAPI
    hostname: MyAnimeRateAPI
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=MyAnimeRateDB
    depends_on:
      db:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully

volumes:
  postgres_data:
